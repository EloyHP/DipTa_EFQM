<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Revisió Memòria EFQM - La DipTa</title>
<style>
/* ══ COLORS I BASES ══ */
:root{
  --navy: #0083A9; --navy2: #006b8a; --navy-pale: #e6f6fa; --gray-dipta: #747678; --black-dipta: #000000;
  --orange: #f97316; --green: #16a34a; --red: #dc2626; --violet: #7c3aed; --vp: #f5f3ff; --vb: #c4b5fd;
  --bg: #f0f4f8; --white: #fff; --g50: #f8fafc; --g100: #e2e8f0; --g200: #cbd5e1; --g300: #94a3b8; --g500: #64748b; --g700: #334155; --g900: #0f172a;
  --sh: 0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05); --sh2: 0 4px 16px rgba(0,0,0,.1); --r: 10px; --tr: .17s ease;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--black-dipta);font-size:14px;line-height:1.55}

/* ══ ESTRUCTURA ══ */
#s1{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%)}
.lbox{background:var(--white);border-radius:18px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
#s2{display:none;height:100vh;flex-direction:column}
.topbar{flex-shrink:0;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:.5rem 1.2rem;z-index:300}
.crit-tabs{flex-shrink:0;background:var(--white);border-bottom:1px solid var(--g100);display:flex;overflow-x:auto;padding:0 1rem}
.ctab{padding:.7rem 1rem;font-size:.8rem;font-weight:600;color:var(--gray-dipta);cursor:pointer;border:none;background:transparent;border-bottom:3px solid transparent;white-space:nowrap}
.ctab.active{color:var(--navy);border-bottom-color:var(--navy)}
.ctab-admin{color:var(--violet)}.ctab-admin.active{border-bottom-color:var(--violet);background:var(--vp)}

.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.scroll-area{flex:1;overflow-y:auto;padding:1rem 1.2rem 3rem}

/* ══ ELEMENTS ADMIN ══ */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
.kpi-card { background: white; padding: 1.2rem; border-radius: var(--r); box-shadow: var(--sh); border-left: 5px solid var(--violet); }
.kpi-num { font-size: 2rem; font-weight: 800; color: var(--violet); }
.admin-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: var(--sh); }
.admin-table th { background: var(--g50); padding: 0.8rem; text-align: left; font-size: 0.7rem; text-transform: uppercase; color: var(--g500); border-bottom: 2px solid var(--g100); }
.admin-table td { padding: 0.8rem; border-bottom: 1px solid var(--g100); font-size: 0.85rem; }

/* Indicadors de millora a la taula */
.indicator-row { display: flex; gap: 4px; margin-top: 4px; }
.ind { font-size: 9px; font-weight: 900; padding: 1px 4px; border-radius: 3px; border: 1px solid transparent; }
.ind-d { background: #e0f2fe; color: #0369a1; border-color: #bae6fd; } /* Desplegament */
.ind-a { background: #fef3c7; color: #92400e; border-color: #fde68a; } /* Avaluació */
.ind-e { background: #dcfce7; color: #15803d; border-color: #bbf7d0; } /* Evidències */
.ind-c { background: #f3f4f6; color: #374151; border-color: #d1d5db; } /* Comentari */

/* ══ MODAL REVISIÓ ELEMENTAL ══ */
.modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 1000; display:none; align-items:center; justify-content:center; }
.modal { background: white; border-radius: 12px; width: 95%; max-width: 900px; max-height: 90vh; display: flex; flex-direction: column; }
.modal-header { padding: 1rem; border-bottom: 1px solid var(--g100); display: flex; justify-content: space-between; align-items:center; }
.modal-body { padding: 1.5rem; overflow-y: auto; flex:1; }
.rev-block { margin-bottom: 1.5rem; border: 1px solid var(--g100); border-radius: 8px; overflow: hidden; }
.rev-header { background: var(--g50); padding: 0.5rem 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--g100); }
.rev-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.rev-col { padding: 1rem; font-size: 0.85rem; white-space: pre-wrap; }
.rev-col.orig { background: #fafafa; color: #666; border-right: 1px solid var(--g100); }
.rev-col.prop { background: #fffbeb; color: #92400e; font-weight: 500; }
.rev-check { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 0.75rem; color: var(--navy); cursor: pointer; }
.rev-check input { width: 18px; height: 18px; accent-color: var(--green); }

/* ══ BOTONS ══ */
.btn { padding: 0.6rem 1rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
.btn-primary { background: var(--navy); color: white; }
.btn-ok { background: var(--green); color: white; }
.btn-ko { background: var(--red); color: white; }
.btn-sm { padding: 0.3rem 0.6rem; font-size: 0.75rem; }

/* ══ IMPRESSIÓ ══ */
#print-area { display: none; padding: 40px; }
@media print {
  body * { visibility: hidden; }
  #print-area, #print-area * { visibility: visible; }
  #print-area { display: block; position: absolute; left: 0; top: 0; width: 100%; }
  .p-changed { background: #f0fdf4 !important; border: 1px dashed var(--green) !important; padding: 10px; }
}

/* ══ UTILS ══ */
.hidden { display: none !important; }
.badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
.b-pend { background: #fff7ed; color: #c2410c; }
.b-ok { background: #dcfce7; color: #15803d; }
</style>
</head>
<body>

<div id="s1">
    <div class="lbox">
        <h2 style="margin-bottom:1rem; color:var(--navy)">Accés Revisió EFQM</h2>
        <input type="email" id="fe" placeholder="el-teu-correu@dipta.cat" style="width:100%; padding:0.8rem; margin-bottom:1rem; border:1.5px solid var(--g100); border-radius:8px;">
        <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Entrar</button>
        <div id="ferr" style="color:red; margin-top:0.5rem; font-size:0.8rem; display:none"></div>
    </div>
</div>

<div id="s2">
    <div class="topbar">
        <strong id="tb-user">Carregant...</strong>
        <button class="btn btn-ko btn-sm" onclick="location.reload()">Sortir</button>
    </div>
    <div class="crit-tabs" id="ctabs"></div>
    <div class="main">
        <div class="scroll-area" id="sarea"></div>
        <div class="scroll-area hidden" id="admin-view"></div>
    </div>
</div>

<div class="modal-overlay" id="modal-rev">
    <div class="modal">
        <div class="modal-header">
            <h3 id="m-title">Revisió de Propostes</h3>
            <button onclick="closeModal()" style="border:none; background:none; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        <div class="modal-body" id="m-body">
            </div>
        <div style="padding:1rem; border-top:1px solid var(--g100); display:flex; justify-content:flex-end; gap:1rem; background:var(--g50)">
            <button class="btn btn-ko" onclick="adminAction('Descartat')">Descartar-ho tot</button>
            <button class="btn btn-ok" onclick="adminAction('Revisat')">Desar decisions</button>
        </div>
    </div>
</div>

<div id="print-area"></div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbynrl8dl98JTPXd0sycbke2s21JtedYTIU90S21uHuWBDwNJHnvbhEIK23MDYQpQlEAEQ/exec";
let mem=[], resp=[], usuaris=[], sess=null, curR=null;

async function api(p){ 
    const r = await fetch(URL, { method:'POST', mode:'no-cors', body: JSON.stringify(p)}); 
    // Com que es no-cors, per actualitzar dades fem un reload o fetch nou
    setTimeout(loadData, 1500);
}

async function loadData(){
    const r = await fetch(URL); const d = await r.json();
    mem=d.memoria; resp=d.respostes; usuaris=d.usuaris;
    renderTabs();
}

function doLogin(){
    const email = document.getElementById('fe').value.toLowerCase().trim();
    const user = usuaris.find(u => u.email_autoritzat.toLowerCase() === email);
    if(user){
        sess = { nom: user.nom_usuari, email, area: user.area_assignada };
        document.getElementById('s1').style.display='none';
        document.getElementById('s2').style.display='flex';
        document.getElementById('tb-user').textContent = sess.nom;
        loadData();
    } else {
        document.getElementById('ferr').style.display='block';
        document.getElementById('ferr').textContent='Usuari no autoritzat.';
    }
}

function renderTabs(){
    const nav = document.getElementById('ctabs'); nav.innerHTML='';
    const esAdmin = sess.area.toLowerCase().includes('global');
    if(esAdmin){
        const b = document.createElement('button'); b.className='ctab ctab-admin'; b.textContent='👑 Administració';
        b.onclick = () => showAdmin(); nav.appendChild(b);
    }
    // Agrupar criteris
    const crits = [...new Set(mem.map(m => m.criteri))].sort();
    crits.forEach(c => {
        const b = document.createElement('button'); b.className='ctab'; b.textContent='Criteri ' + c;
        b.onclick = () => renderCrit(c); nav.appendChild(b);
    });
}

function showAdmin(){
    document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('active'));
    document.querySelector('.ctab-admin').classList.add('active');
    document.getElementById('sarea').classList.add('hidden');
    const av = document.getElementById('admin-view'); av.classList.remove('hidden');
    
    // Filtres millores
    const millores = resp.filter(r => !r.id_enfocament.startsWith('NEW-'));
    const nous = resp.filter(r => r.id_enfocament.startsWith('NEW-'));

    av.innerHTML = `
        <div class="kpi-grid">
            <div class="kpi-card"><div class="kpi-num">${nous.length}</div><div style="font-size:0.7rem">NOUS ENFOCAMENTS</div></div>
            <div class="kpi-card" style="border-left-color:var(--orange)"><div class="kpi-num">${millores.length}</div><div style="font-size:0.7rem">MILLORES PROPOSADES</div></div>
        </div>
        <button class="btn btn-primary" style="margin-bottom:1rem" onclick="generatePDF()">📄 Generar Esborrany Final Fusionat</button>
        <table class="admin-table">
            <thead><tr><th>Tipus</th><th>Enfocament / Canvis</th><th>Usuari</th><th>Estat</th><th>Acció</th></tr></thead>
            <tbody id="admin-tbody"></tbody>
        </table>
    `;

    const tbody = document.getElementById('admin-tbody');
    resp.forEach(r => {
        const isNew = r.id_enfocament.startsWith('NEW-');
        const m = mem.find(x => x.id === r.id_enfocament);
        const tr = document.createElement('tr');
        
        let indicators = '';
        if(!isNew) {
            if(r.sug_desplegament) indicators += '<span class="ind ind-d">D</span>';
            if(r.sug_avaluacio) indicators += '<span class="ind ind-a">A</span>';
            if(r.sug_evidencies) indicators += '<span class="ind ind-e">E</span>';
            if(r.comentari_general) indicators += '<span class="ind ind-c">C</span>';
        }

        tr.innerHTML = `
            <td><span class="badge ${isNew?'b-ok':'b-pend'}">${isNew?'NOU':'MILLORA'}</span></td>
            <td>
                <strong>${isNew ? r.sug_titol_enfocament : (m?.titol_enfocament || '---')}</strong>
                <div class="indicator-row">${indicators}</div>
            </td>
            <td>${r.nom_visible}</td>
            <td><span class="badge">${r.estat_admin || 'Pendent'}</span></td>
            <td><button class="btn btn-primary btn-sm" onclick="openReview('${r.id_enfocament}', '${r.email}')">Revisar</button></td>
        `;
        tbody.appendChild(tr);
    });
}

function openReview(id, email){
    curR = resp.find(x => x.id_enfocament === id && x.email === email);
    const isNew = id.startsWith('NEW-');
    const m = mem.find(x => x.id === id);
    const body = document.getElementById('m-body');
    body.innerHTML = '';

    if(isNew){
        body.innerHTML = `<div class="rev-block"><div class="rev-header">NOU ENFOCAMENT</div><div style="padding:1rem"><strong>${curR.sug_titol_enfocament}</strong><p>${curR.sug_enfocament}</p></div></div>`;
    } else {
        const fields = [
            {k: 'desplegament', l: 'Desplegament (D)', s: 'sug_desplegament'},
            {k: 'avaluacio', l: 'Avaluació i Revisió (A)', s: 'sug_avaluacio'},
            {k: 'evidencies', l: 'Evidències (E)', s: 'sug_evidencies'}
        ];
        fields.forEach(f => {
            if(curR[f.s]){
                const div = document.createElement('div'); div.className='rev-block';
                div.innerHTML = `
                    <div class="rev-header">
                        <span>${f.l}</span>
                        <label class="rev-check"><input type="checkbox" id="chk-${f.k}" ${curR['aprovat_'+f.k]?'checked':''}> Aprovar aquest element</label>
                    </div>
                    <div class="rev-grid">
                        <div class="rev-col orig">${m[f.k]}</div>
                        <div class="rev-col prop">${curR[f.s]}</div>
                    </div>
                `;
                body.appendChild(div);
            }
        });
    }
    document.getElementById('modal-rev').style.display='flex';
}

function closeModal(){ document.getElementById('modal-rev').style.display='none'; }

async function adminAction(estat){
    const updates = {
        email: curR.email,
        id_enfocament: curR.id_enfocament,
        estat_admin: estat,
        aprovat_desplegament: document.getElementById('chk-desplegament')?.checked || false,
        aprovat_avaluacio: document.getElementById('chk-avaluacio')?.checked || false,
        aprovat_evidencies: document.getElementById('chk-evidencies')?.checked || false
    };
    
    // Enviem al servidor
    const r = await fetch(URL, { method:'POST', body: JSON.stringify(updates)});
    closeModal();
    alert("Decisió desada. Les dades s'actualitzaran en uns segons.");
    loadData();
}

function generatePDF() {
    const pa = document.getElementById('print-area');
    pa.innerHTML = '<h1>Esborrany Memòria EFQM (Fusionat)</h1>';
    
    const crits = [...new Set(mem.map(m => m.criteri))].sort();
    crits.forEach(c => {
        pa.innerHTML += `<h2>Criteri ${c}</h2>`;
        mem.filter(m => m.criteri === c).forEach(row => {
            const r = resp.find(x => x.id_enfocament === row.id && x.estat_admin === 'Revisat');
            let h = `<div style="margin-bottom:20px; border-bottom:1px solid #ccc; padding-bottom:10px;">`;
            h += `<h3>${row.titol_enfocament}</h3>`;
            
            // Lògica de fusió
            const textD = (r && r.aprovat_desplegament) ? `<div class="p-changed"><strong>[MILLORA]</strong> ${r.sug_desplegament}</div>` : row.desplegament;
            const textA = (r && r.aprovat_avaluacio) ? `<div class="p-changed"><strong>[MILLORA]</strong> ${r.sug_avaluacio}</div>` : row.avaluacio;
            const textE = (r && r.aprovat_evidencies) ? `<div class="p-changed"><strong>[MILLORA]</strong> ${r.sug_evidencies}</div>` : row.evidencies;

            h += `<p><strong>Desplegament:</strong> ${textD}</p>`;
            h += `<p><strong>Avaluació:</strong> ${textA}</p>`;
            h += `<p><strong>Evidències:</strong> ${textE}</p>`;
            h += `</div>`;
            pa.innerHTML += h;
        });
    });
    window.print();
}

function renderCrit(c){
    document.getElementById('admin-view').classList.add('hidden');
    document.getElementById('sarea').classList.remove('hidden');
    document.querySelectorAll('.ctab').forEach(t=>t.classList.remove('active'));
    // (Faltaria marcar el tab actiu aquí)
    const area = document.getElementById('sarea');
    area.innerHTML = `<h2>Criteri ${c}</h2>`;
    mem.filter(m => m.criteri === c).forEach(row => {
        const d = document.createElement('div'); d.style = "background:white; padding:1rem; margin-bottom:1rem; border-radius:8px; shadow:var(--sh)";
        d.innerHTML = `<strong>${row.titol_enfocament}</strong><p style="font-size:0.8rem; color:#666">${row.desplegament.substring(0,100)}...</p>`;
        area.appendChild(d);
    });
}

window.onload = loadData;
</script>
</body>
</html>
